services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # schema.sql se ejecuta automaticamente la primera vez que se crea el volumen
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seed:
    image: golang:1.26
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/go/pkg/mod
    command: go run scripts/seed/main.go
    env_file:
      - .env
    environment:
      # Dentro de Docker el host es el nombre del servicio, no localhost
      # El puerto interno de postgres es siempre 5432 (el mapeo 5433 es solo para el host)
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      - db

volumes:
  pgdata:
  go-cache: